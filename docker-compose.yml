services:
  # ============================
  # MySQL 数据库
  # ============================
  db:
    image: mysql:8.0
    container_name: label-3959-db
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --init-connect=SET NAMES utf8mb4
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mybatis_demo
      MYSQL_ROOT_HOST: "%"
      TZ: Asia/Shanghai
    ports:
      - "33959:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123 && mysql -h localhost -uroot -proot123 -e 'USE mybatis_demo'"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - app-net

  # ============================
  # Spring Boot 后端
  # ============================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: label-3959-backend
    restart: unless-stopped
    ports:
      - "8959:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/mybatis_demo?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      TZ: Asia/Shanghai
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

  # ============================
  # Vue + Nginx 前端
  # ============================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: label-3959-frontend
    ports:
      - "3959:80"
    depends_on:
      - backend
    networks:
      - app-net

volumes:
  db_data:

networks:
  app-net:
    driver: bridge
