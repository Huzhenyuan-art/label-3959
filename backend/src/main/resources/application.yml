server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://db:3306/mybatis_demo?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 120000
      maximum-pool-size: 10

mybatis-plus:
  configuration:
    # 开启驼峰命名映射
    map-underscore-to-camel-case: true
    # 打印 SQL 日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 主键策略
      id-type: auto
  # XML Mapper 位置
  mapper-locations: classpath:mapper/*.xml

logging:
  level:
    com.example.demo: debug
    com.baomidou.mybatisplus: info

jwt:
  secret: mybatis-plus-demo-secret-key-1234567890abcdef
  expire-hours: 24
