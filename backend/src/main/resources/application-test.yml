server:
  port: 8080

spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:mysql://localhost:3306/mybatis_demo_test?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${TEST_DB_USERNAME:root}
    password: ${TEST_DB_PASSWORD:root123}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    com.example.demo: info
    com.baomidou.mybatisplus: warn
    org.springframework: warn

jwt:
  secret: ${TEST_JWT_SECRET:mybatis-plus-demo-test-secret-key-0987654321fedcba}
  expire-hours: 12

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: when-authorized
