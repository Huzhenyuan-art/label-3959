name: Build & Deploy

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - prod
      skip_tests:
        description: 'Skip tests'
        required: false
        default: false
        type: boolean

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}-frontend

jobs:
  # ============================
  # 版本信息提取
  # ============================
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      build_number: ${{ steps.get_version.outputs.build_number }}
      image_tag: ${{ steps.get_version.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(cat backend/pom.xml | grep -m1 '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          fi
          BUILD_NUMBER=${GITHUB_RUN_NUMBER}
          IMAGE_TAG="${VERSION}-${BUILD_NUMBER}"
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          
          echo "Version: ${VERSION}"
          echo "Build Number: ${BUILD_NUMBER}"
          echo "Image Tag: ${IMAGE_TAG}"

  # ============================
  # 单元测试
  # ============================
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: version
    if: ${{ !inputs.skip_tests }}

    services:
      mysql:
        image: mysql:8.0.37
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: mybatis_demo_test
          MYSQL_ROOT_HOST: '%'
          TZ: Asia/Shanghai
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot123 -s"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysql -h127.0.0.1 -uroot -proot123 -e "SELECT 1" &> /dev/null; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Initialize database
        run: mysql -h127.0.0.1 -uroot -proot123 mybatis_demo_test < init.sql

      - name: Run backend tests
        working-directory: backend
        env:
          TEST_DB_URL: jdbc:mysql://127.0.0.1:3306/mybatis_demo_test?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
          TEST_DB_USERNAME: root
          TEST_DB_PASSWORD: root123
          TEST_JWT_SECRET: github-build-test-secret-key-0987654321fedcba
        run: |
          mvn test -B -Ptest \
            -Dmaven.test.failure.ignore=false \
            -Dfile.encoding=UTF-8

  # ============================
  # 构建后端镜像
  # ============================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [version, tests]
    if: |
      always() &&
      (needs.tests.result == 'success' || needs.tests.result == 'skipped')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ needs.version.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:buildcache
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:buildcache,mode=max
          build-args: |
            PROFILE=prod
            SKIP_TESTS=true
          labels: |
            org.opencontainers.image.title=mybatis-plus-demo-backend
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.pushed_at }}

      - name: Output backend image info
        run: |
          echo "Backend image built successfully!"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ needs.version.outputs.image_tag }}"

  # ============================
  # 构建前端镜像
  # ============================
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [version, tests]
    if: |
      always() &&
      (needs.tests.result == 'success' || needs.tests.result == 'skipped')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ needs.version.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:buildcache
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:buildcache,mode=max
          build-args: |
            BUILD_MODE=production
          labels: |
            org.opencontainers.image.title=mybatis-plus-demo-frontend
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.pushed_at }}

      - name: Output frontend image info
        run: |
          echo "Frontend image built successfully!"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ needs.version.outputs.image_tag }}"

  # ============================
  # 部署校验
  # ============================
  deploy-verify:
    name: Deploy & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [version, build-backend, build-frontend]
    if: |
      always() &&
      needs.build-backend.result == 'success' &&
      needs.build-frontend.result == 'success'

    permissions:
      contents: read
      packages: read

    env:
      DEPLOY_ENV: ${{ inputs.environment || 'test' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create test environment
        run: |
          cat > .env << EOF
          SPRING_PROFILES_ACTIVE=test
          SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/mybatis_demo?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
          SPRING_DATASOURCE_USERNAME=root
          SPRING_DATASOURCE_PASSWORD=root123
          MYSQL_ROOT_PASSWORD=root123
          MYSQL_DATABASE=mybatis_demo
          JWT_SECRET=deploy-verify-secret-key-1234567890abcdef
          JWT_EXPIRE_HOURS=24
          EOF

      - name: Update docker-compose for verification
        run: |
          cat > docker-compose.verify.yml << 'EOF'
          version: '3.8'
          services:
            db:
              image: mysql:8.0.37
              environment:
                MYSQL_ROOT_PASSWORD: root123
                MYSQL_DATABASE: mybatis_demo
                MYSQL_ROOT_HOST: '%'
                TZ: Asia/Shanghai
              ports:
                - "3306:3306"
              volumes:
                - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
              healthcheck:
                test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123 -s"]
                interval: 10s
                timeout: 5s
                retries: 10
                start_period: 45s

            backend:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ needs.version.outputs.image_tag }}
              environment:
                SPRING_PROFILES_ACTIVE: test
                SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/mybatis_demo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
                SPRING_DATASOURCE_USERNAME: root
                SPRING_DATASOURCE_PASSWORD: root123
                JWT_SECRET: deploy-verify-secret-key-1234567890abcdef
                JAVA_OPTS: -Xms256m -Xmx512m
              ports:
                - "8080:8080"
              depends_on:
                db:
                  condition: service_healthy
              healthcheck:
                test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/liveness || exit 1"]
                interval: 15s
                timeout: 10s
                retries: 8
                start_period: 90s

            frontend:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ needs.version.outputs.image_tag }}
              ports:
                - "80:80"
              depends_on:
                backend:
                  condition: service_healthy
              healthcheck:
                test: ["CMD-SHELL", "curl -fsS http://localhost/ || exit 1"]
                interval: 10s
                timeout: 5s
                retries: 3
                start_period: 20s
          EOF

      - name: Start verification environment
        run: |
          docker-compose -f docker-compose.verify.yml up -d
          echo "Waiting for services to start..."

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health/liveness; then
              echo "Backend is healthy!"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 10
          done

      - name: Verify backend API
        run: |
          echo "=== Verifying Backend API ==="
          
          # Test health endpoint
          echo "1. Testing health endpoint..."
          curl -fsS http://localhost:8080/actuator/health
          echo ""
          
          # Test info endpoint
          echo "2. Testing info endpoint..."
          curl -fsS http://localhost:8080/actuator/info
          echo ""
          
          # Test login API
          echo "3. Testing login API..."
          LOGIN_RESPONSE=$(curl -s -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin123"}')
          echo "Login response: $LOGIN_RESPONSE"
          
          echo "All backend checks passed!"

      - name: Verify frontend
        run: |
          echo "=== Verifying Frontend ==="
          
          if curl -fsS http://localhost/ | grep -q "index.html"; then
            echo "Frontend is accessible!"
          else
            echo "Frontend content check"
            curl -fsS http://localhost/ | head -20
          fi
          
          echo "All frontend checks passed!"

      - name: Generate verification report
        run: |
          echo "## Deployment Verification Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment: ${{ env.DEPLOY_ENV }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build**: ${{ needs.version.outputs.build_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: ${{ needs.version.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images Built" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ needs.version.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ needs.version.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verification Status: ✅ PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Backend API: Available" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend UI: Accessible" >> $GITHUB_STEP_SUMMARY
          echo "- Health Checks: Passing" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: |
          docker-compose -f docker-compose.verify.yml down -v 2>/dev/null || true
          rm -f docker-compose.verify.yml .env
