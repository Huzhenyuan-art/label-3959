name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  MAVEN_VERSION: '3.9.8'

jobs:
  # ============================
  # 代码质量检查
  # ============================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Maven compile check
        working-directory: backend
        run: mvn compile -q -B -DskipTests

  # ============================
  # 后端单元测试
  # ============================
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: code-quality
    services:
      mysql:
        image: mysql:8.0.37
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: mybatis_demo_test
          MYSQL_ROOT_HOST: '%'
          TZ: Asia/Shanghai
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot123 -s"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --name=mysql-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysql -h127.0.0.1 -uroot -proot123 -e "SELECT 1" &> /dev/null; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Initialize database schema
        run: |
          mysql -h127.0.0.1 -uroot -proot123 mybatis_demo_test < init.sql

      - name: Run backend tests
        working-directory: backend
        env:
          TEST_DB_URL: jdbc:mysql://127.0.0.1:3306/mybatis_demo_test?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
          TEST_DB_USERNAME: root
          TEST_DB_PASSWORD: root123
          TEST_JWT_SECRET: github-ci-test-secret-key-0987654321fedcba
        run: |
          mvn test -B -Ptest \
            -Dmaven.test.failure.ignore=false \
            -Dfile.encoding=UTF-8 \
            -Dspring.profiles.active=test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/target/surefire-reports/
            backend/target/site/jacoco/
          retention-days: 7

      - name: Check test results
        if: failure()
        run: |
          echo "Backend tests failed! Check the test reports for details."
          find backend/target/surefire-reports -name "*.txt" -exec cat {} \;
          exit 1

  # ============================
  # 前端构建检查
  # ============================
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build for test
        working-directory: frontend
        run: npm run build:test

      - name: Build for production
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 3

  # ============================
  # 安全扫描
  # ============================
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-tests, frontend-build]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run npm audit
        working-directory: frontend
        continue-on-error: true
        run: |
          npm audit --audit-level=high
          echo "npm audit completed"

      - name: Check for hardcoded secrets
        uses: actions/checkout@v4
      - name: Secret scanning
        run: |
          echo "Checking for hardcoded secrets..."
          grep -r "password\|secret\|key\|token" backend/src/main/resources/*.yml \
            frontend/.env.* 2>/dev/null || true
          echo "Secret scan completed"

  # ============================
  # 流水线总结
  # ============================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [code-quality, backend-tests, frontend-build, security-scan]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate CI Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Code Quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Tests: ${{ needs.backend-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Build: ${{ needs.frontend-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure')
        run: |
          echo "CI Pipeline failed! Check the failed jobs above."
          exit 1
